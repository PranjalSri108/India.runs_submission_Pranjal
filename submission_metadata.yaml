ai_usage_summary: |
  Used Claude as a pair-programming and code-review assistant
  throughout: scaffolding modules, refactoring to a single-source-of-truth layout,
  writing tests, and drafting docs. All design decisions (feature-based scoring,
  multiplicative gates, the honeypot ratio check, the saturation/seniority-gate fix)
  were made and validated by the team against a hand-labeled set. No candidate data
  was sent to any hosted LLM, and the ranker itself makes zero LLM/API calls.

# ============================================================================
# Approach summary (≤200 words; this is 169)
# ============================================================================
methodology_summary: |
  We rank candidates with a feature-based, fully-explainable scorer rather than
  keyword or embedding similarity, because the pool is adversarial: keyword-stuffers,
  honeypots, and behavioral twins all defeat naive matching. Each candidate's score
  decomposes into auditable terms — applied-ML years at product companies, core
  retrieval/ranking skills with plausible durations, and evidence of shipping a
  ranking/search/recommendation system — gated multiplicatively by availability,
  location, and an internal-consistency check that collapses impossible profiles (a
  skill 'used' longer than the person has worked). Role classification keys on career
  title and industry, treating free-text descriptions as low-trust noise. Lacking
  ground truth, we tuned against a hand-labeled validation set: 60 stratified profiles
  graded 0–5 blind to the model's predictions, across two independent passes (96.7%
  self-agreement). This surfaced one systematic flaw — over-experienced profiles
  ranking too high — fixed by saturating the experience term and converting the
  seniority band into a multiplicative gate, lifting NDCG@10 from 0.87 to 0.92 without
  burying any genuine fit. The final top-100 contains zero impossible profiles and is
  produced in 13 seconds, CPU-only.

