# Single command that produces submission.csv from the candidates file.
# The candidates path is a CLI argument (--candidates, or a bare positional),
# never hardcoded; --out sets the destination. A plain data/candidates.jsonl
# also works (gzip is detected by magic bytes, not extension). The no-arg form
# `python -m src.rank` auto-resolves data/candidates.jsonl.gz then .jsonl.
# Runs in ~12s on CPU, fully offline; output is byte-identical run to run.
reproduce_command: "python -m src.rank --candidates data/candidates.jsonl.gz --out submission.csv"

